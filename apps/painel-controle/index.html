<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel-window">
        <div class="toolbar">
            <div class="toolbar-menu">
                <span class="menu-item" data-menu="file">Arquivo</span>
                <span class="menu-item" data-menu="edit">Editar</span>
                <span class="menu-item" data-menu="view">Exibir</span>
                <span class="menu-item" data-menu="help">Ajuda</span>
            </div>
        </div>
        
        <div class="panel-header">
            <span class="panel-title">Painel de Controle</span>
            <span class="panel-desc">Ajustar configurações do computador</span>
        </div>
        
        <div class="categories-container">
            <div class="category">
                <div class="category-header" data-category="system">
                    <span class="category-icon">🖥️</span>
                    <span class="category-name">Sistema</span>
                </div>
                <div class="category-items" id="systemItems"></div>
            </div>
            
            <div class="category">
                <div class="category-header" data-category="hardware">
                    <span class="category-icon">🖱️</span>
                    <span class="category-name">Hardware</span>
                </div>
                <div class="category-items" id="hardwareItems"></div>
            </div>
            
            <div class="category">
                <div class="category-header" data-category="appearance">
                    <span class="category-icon">🎨</span>
                    <span class="category-name">Aparência</span>
                </div>
                <div class="category-items" id="appearanceItems"></div>
            </div>
            
            <div class="category">
                <div class="category-header" data-category="network">
                    <span class="category-icon">🌐</span>
                    <span class="category-name">Rede</span>
                </div>
                <div class="category-items" id="networkItems"></div>
            </div>
            
            <div class="category">
                <div class="category-header" data-category="programs">
                    <span class="category-icon">📦</span>
                    <span class="category-name">Programas</span>
                </div>
                <div class="category-items" id="programsItems"></div>
            </div>
            
            <div class="category">
                <div class="category-header" data-category="users">
                    <span class="category-icon">👥</span>
                    <span class="category-name">Usuários</span>
                </div>
                <div class="category-items" id="usersItems"></div>
            </div>
        </div>
        
        <div class="status-bar">
            <span id="itemCount">24 objeto(s) no Painel de Controle</span>
        </div>
    </div>

    <div class="property-modal hidden" id="propertyModal">
        <div class="property-title" id="propertyTitle">Propriedades</div>
        <div class="property-content" id="propertyContent"></div>
        <button class="property-close" id="propertyClose">OK</button>
    </div>

    <div class="error-modal hidden" id="errorModal">
        <div class="error-title">Erro</div>
        <div class="error-content">
            <span class="error-icon">❌</span>
            <span class="error-message" id="errorMessage"></span>
        </div>
        <button class="error-close" id="errorClose">✕</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
