<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔢 SUDOKU • ARCADE RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sudoku-game">
        <div class="game-header">
            <button class="back-btn" id="backToArcade">← VOLTAR</button>
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">TEMPO</span>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">ERROS</span>
                    <span class="stat-value" id="errors">0/3</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">DICAS</span>
                    <span class="stat-value" id="hints">3</span>
                </div>
            </div>
        </div>

        <div class="difficulty-selector">
            <span class="difficulty-label">DIFICULDADE:</span>
            <button class="difficulty-btn active" data-difficulty="easy">😊 FÁCIL</button>
            <button class="difficulty-btn" data-difficulty="medium">😐 MÉDIO</button>
            <button class="difficulty-btn" data-difficulty="hard">😰 DIFÍCIL</button>
            <button class="difficulty-btn" data-difficulty="expert">🤯 EXPERT</button>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="450" height="450"></canvas>
            
            <div class="number-pad">
                <button class="num-btn" data-num="1">1</button>
                <button class="num-btn" data-num="2">2</button>
                <button class="num-btn" data-num="3">3</button>
                <button class="num-btn" data-num="4">4</button>
                <button class="num-btn" data-num="5">5</button>
                <button class="num-btn" data-num="6">6</button>
                <button class="num-btn" data-num="7">7</button>
                <button class="num-btn" data-num="8">8</button>
                <button class="num-btn" data-num="9">9</button>
                <button class="num-btn clear-btn" data-num="0">⌫</button>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="newGameBtn">🔄 NOVO JOGO</button>
                <button class="action-btn" id="hintBtn">💡 DICA</button>
                <button class="action-btn" id="checkBtn">✅ VERIFICAR</button>
            </div>
        </div>

        <div class="game-footer">
            <span>🔢 Use os números ou clique nas células</span>
            <span>Pressione 1-9 para preencher</span>
        </div>

        <div class="message-screen hidden" id="victoryScreen">
            <div class="message-content">
                <h2>🏆 PARABÉNS! 🏆</h2>
                <p>Você completou o Sudoku!</p>
                <p id="victoryTime">Tempo: 00:00</p>
                <p id="victoryErrors">Erros: 0</p>
                <button class="restart-btn" id="victoryRestartBtn">JOGAR NOVAMENTE</button>
            </div>
        </div>

        <div class="message-screen hidden" id="gameOverScreen">
            <div class="message-content">
                <h2>💀 GAME OVER</h2>
                <p>Você cometeu 3 erros!</p>
                <p id="gameOverTime">Tempo: 00:00</p>
                <button class="restart-btn" id="gameOverRestartBtn">TENTAR NOVAMENTE</button>
            </div>
        </div>

        <div class="toast-message hidden" id="toastMessage">
            <span id="toastText"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
