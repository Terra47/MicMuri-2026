<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎴 JOGO DA MEMÓRIA • ARCADE RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="memory-game">
        <div class="game-header">
            <button class="back-btn" id="backToArcade">← VOLTAR</button>
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">🎯 JOGADAS</span>
                    <span class="stat-value" id="moves">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">✅ ACERTOS</span>
                    <span class="stat-value" id="matches">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">⭐ PONTOS</span>
                    <span class="stat-value" id="score">0</span>
                </div>
            </div>
        </div>

        <div class="difficulty-selector">
            <span class="difficulty-label">📊 NÍVEL:</span>
            <button class="difficulty-btn active" data-size="4">😊 FÁCIL</button>
            <button class="difficulty-btn" data-size="6">😐 MÉDIO</button>
            <button class="difficulty-btn" data-size="8">😰 DIFÍCIL</button>
        </div>

        <div class="game-area">
            <div class="board-wrapper">
                <div class="board" id="board"></div>
            </div>
        </div>

        <div class="footer-stats">
            <div class="timer">
                <span class="timer-label">⏱️ TEMPO</span>
                <span class="timer-value" id="timer">00:00</span>
            </div>
            <div class="record">
                <span class="record-label">🏆 RECORDE</span>
                <span class="record-value" id="record">--:--</span>
            </div>
            <button class="new-game-btn" id="newGameBtn">🔄 NOVO JOGO</button>
        </div>

        <div class="message-screen hidden" id="gameOverScreen">
            <div class="message-content">
                <h2 id="gameOverTitle">🎉 PARABÉNS! 🎉</h2>
                <p id="gameOverMessage"></p>
                <p id="gameOverStats"></p>
                <button class="restart-btn" id="restartBtn">🔄 JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
