<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❌ JOGO DA VELHA • ARCADE RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="velha-game">
        <div class="game-header">
            <button class="back-btn" id="backToArcade">← VOLTAR</button>
            <div class="score-box">
                <span class="score-label">VITÓRIAS</span>
                <span class="score-value" id="playerWins">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">EMPATES</span>
                <span class="score-value" id="draws">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">DERROTAS</span>
                <span class="score-value" id="computerWins">0</span>
            </div>
        </div>

        <div class="difficulty-selector">
            <span class="difficulty-label">DIFICULDADE:</span>
            <button class="difficulty-btn active" data-difficulty="easy">FÁCIL</button>
            <button class="difficulty-btn" data-difficulty="medium">MÉDIO</button>
            <button class="difficulty-btn" data-difficulty="hard">DIFÍCIL</button>
            <button class="difficulty-btn" data-difficulty="impossible">IMPOSSÍVEL</button>
        </div>

        <div class="game-area">
            <div class="turn-indicator">
                <span class="turn-text" id="turnText">SUA VEZ (❌)</span>
                <span class="turn-light" id="turnLight"></span>
            </div>

            <div class="board" id="board">
            </div>

            <div class="current-score">
                <div class="player-mark">❌ VOCÊ</div>
                <div class="vs">VS</div>
                <div class="computer-mark">⭕ COMPUTADOR</div>
            </div>
        </div>

        <div class="game-controls">
            <button class="action-btn" id="newGameBtn">NOVO JOGO</button>
            <button class="action-btn" id="resetScoreBtn">ZERAR PLACAR</button>
        </div>

        <div class="message-screen hidden" id="gameOverScreen">
            <div class="message-content">
                <h2 id="gameOverTitle">FIM DE JOGO</h2>
                <p id="gameOverMessage"></p>
                <button class="restart-btn" id="restartBtn">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
