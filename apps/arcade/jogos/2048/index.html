<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌀 2048 • FLIPERAMA RETRÔ</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="arcade-machine">
        <div class="arcade-top">
            <div class="marquee">
                <div class="marquee-inner">
                    <span>★ 2048 ★ 2048 ★ 2048 ★ 2048 ★</span>
                </div>
            </div>
        </div>

        <div class="arcade-body">
            <div class="nav-bar">
                <button class="nav-btn back-btn" id="backToArcade">← VOLTAR</button>
                <div class="credit-display">
                    <span class="credit-label">CRÉDITOS</span>
                    <span class="credit-value">∞</span>
                </div>
            </div>

            <div class="screen-container">
                <div class="screen">
                    <div class="screen-header">
                        <div class="game-title">2048</div>
                    </div>

                    <div class="scoreboard">
                        <div class="score-item">
                            <span class="score-label">SCORE</span>
                            <span class="score-value" id="score">0</span>
                        </div>
                        <div class="score-item">
                            <span class="score-label">BEST</span>
                            <span class="score-value" id="highScore">0</span>
                        </div>
                    </div>

                    <div class="game-area">
                        <div class="grid-container" id="gridContainer"></div>
                    </div>

                    <div class="game-stats">
                        <div class="stat-mini">
                            <span>MAIOR:</span>
                            <span id="bestTile">0</span>
                        </div>
                        <div class="stat-mini">
                            <span>MOVES:</span>
                            <span id="moveCount">0</span>
                        </div>
                    </div>

                    <div class="game-controls">
                        <button class="control-btn" id="newGameBtn">NOVO JOGO</button>
                        <button class="control-btn" id="restartBtn">REINICIAR</button>
                    </div>

                    <div class="touch-controls">
                        <button class="touch-btn" id="touchUp">▲</button>
                        <div class="touch-row">
                            <button class="touch-btn" id="touchLeft">◀</button>
                            <button class="touch-btn" id="touchDown">▼</button>
                            <button class="touch-btn" id="touchRight">▶</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="arcade-bottom">
            <span>© 2048 ARCADE</span>
        </div>
    </div>

    <script src="../script.js"></script>
    <script src="script.js"></script>
</body>
</html>
