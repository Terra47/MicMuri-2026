<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 SNAKE • ARCADE RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="snake-game">
        <div class="game-header">
            <button class="back-btn" id="backToArcade">← VOLTAR</button>
            <div class="score-board">
                <span class="score-label">PONTOS</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="high-score">
                <span class="score-label">RECORDE</span>
                <span class="score-value" id="highScore">0</span>
            </div>
        </div>

        <div class="mode-selector">
            <span class="mode-label">MODO:</span>
            <button class="mode-btn active" data-mode="classic">CLÁSSICO</button>
            <button class="mode-btn" data-mode="walls">PAREDES MATA</button>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="start-screen" id="startScreen">
                <div class="start-content">
                    <h2>🐍 SNAKE</h2>
                    <p>Use as setas para mover a cobra</p>
                    <p>Coma as maçãs para crescer</p>
                    <button class="start-btn" id="startGameBtn">▶ INICIAR JOGO</button>
                    <div class="controls-info">
                        <div class="control-item">
                            <span class="key">▲</span>
                            <span class="key">▼</span>
                            <span class="key">◀</span>
                            <span class="key">▶</span>
                        </div>
                        <div class="control-item">
                            <span class="key">R</span>
                            <span>Reiniciar</span>
                        </div>
                        <div class="control-item">
                            <span class="key">ESPAÇO</span>
                            <span>Pausar</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pause-screen hidden" id="pauseScreen">
                <div class="pause-content">
                    <h2>⏸️ PAUSADO</h2>
                    <p>Pressione ESPAÇO para continuar</p>
                </div>
            </div>
        </div>

        <div class="game-controls">
            <div class="control-group">
                <span class="key">▲</span>
                <span class="key">▼</span>
                <span class="key">◀</span>
                <span class="key">▶</span>
            </div>
            <div class="control-group">
                <span class="key">ESPAÇO</span>
                <span>PAUSAR</span>
            </div>
            <div class="control-group">
                <span class="key">R</span>
                <span>REINICIAR</span>
            </div>
            <button class="action-btn" id="newGameBtn">🔄 NOVO JOGO</button>
            <div class="mobile-controls">
                <div class="d-pad">
                    <button class="dpad-btn" id="touchUp">▲</button>
                    <div class="dpad-middle">
                        <button class="dpad-btn" id="touchLeft">◀</button>
                        <button class="dpad-btn" id="touchDown">▼</button>
                        <button class="dpad-btn" id="touchRight">▶</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="message-screen hidden" id="gameOverScreen">
            <div class="message-content">
                <h2>💀 GAME OVER</h2>
                <p id="gameOverScore">Pontuação: 0</p>
                <p id="gameOverHighScore">Recorde: 0</p>
                <button class="restart-btn" id="restartBtn">JOGAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
