<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📝 TERMO • ARCADE RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="termo-game">
        <div class="game-header">
            <button class="back-btn" id="backToArcade">← VOLTAR</button>
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">TENTATIVAS</span>
                    <span class="stat-value" id="attempts">0/6</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">VITÓRIAS</span>
                    <span class="stat-value" id="wins">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">SEQUÊNCIA</span>
                    <span class="stat-value" id="streak">0</span>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="board-container">
                <div class="board" id="board"></div>
            </div>

            <div class="keyboard" id="keyboard"></div>

            <div class="action-buttons">
                <button class="action-btn" id="newGameBtn">🔄 NOVA PALAVRA</button>
                <button class="action-btn" id="hintBtn">💡 DICA</button>
            </div>
        </div>

        <div class="game-footer">
            <span>📝 TERMO • ACERTE A PALAVRA DE 5 LETRAS</span>
            <span>Digite no teclado ou pressione letras</span>
        </div>

        <div class="message-screen hidden" id="victoryScreen">
            <div class="message-content">
                <h2>🏆 PARABÉNS! 🏆</h2>
                <p>Você acertou a palavra!</p>
                <p id="victoryWord">Palavra: </p>
                <p id="victoryAttempts">Tentativas: 0/6</p>
                <button class="restart-btn" id="victoryRestartBtn">JOGAR NOVAMENTE</button>
            </div>
        </div>

        <div class="message-screen hidden" id="gameOverScreen">
            <div class="message-content">
                <h2>💀 GAME OVER</h2>
                <p id="gameOverWord">A palavra era: </p>
                <button class="restart-btn" id="gameOverRestartBtn">TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
