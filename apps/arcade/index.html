<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕹️ ARCADE • FLIPERAMA RETRÔ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="arcade-cabinet">
        <div class="arcade-header">
            <span class="arcade-title">🕹️ FLIPERAMA RETRÔ • 1995</span>
            <div class="arcade-controls">
                <button class="arcade-btn" id="minimize" aria-label="Minimizar">─</button>
                <button class="arcade-btn" id="maximize" aria-label="Maximizar">□</button>
                <button class="arcade-btn" id="close" aria-label="Fechar">✕</button>
            </div>
        </div>
        
        <div class="arcade-marquee">
            <span class="marquee-text">✦ 3 CRÉDITOS GRÁTIS ✦ INSIRA A SENHA PARA MAIS ✦</span>
        </div>
        
        <div class="credit-system">
            <div class="credit-display">
                <span class="credit-label">CRÉDITOS</span>
                <span class="credit-value" id="creditCount">03</span>
            </div>
            
            <div class="credit-insert">
                <input type="password" class="credit-password" id="creditPassword" placeholder="SENHA">
                <button class="credit-button" id="addCredits">+ INSERIR</button>
            </div>
            
            <div class="credit-message" id="creditMessage"></div>
        </div>
        
        <div class="games-grid" id="gamesGrid">

        </div>
        
        <div class="arcade-footer">
            <div class="footer-left">
                <span>🕹️ 3 CRÉDITOS INICIAIS</span>
            </div>
            <div class="footer-right">
                <span id="creditsRemaining">3 CRÉDITOS RESTANTES</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
